<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>區塊鏈二手票券系統</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .box { background: white; border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>去中心化票券系統 DApp</h1>
    
    <div class="box">
        <h3>第一步：連接錢包</h3>
        <button id="connectBtn">連接 MetaMask</button>
        <p>目前登入帳戶：<strong id="accountAddress">尚未連接</strong></p>
    </div>

    <div class="box">
        <h3>第二步：主辦方建立活動</h3>
        <p>測試用：建立一個名為「五月天演唱會」的活動，票價為 1 ETH，總共 100 張票。</p>
        <button id="createBtn">建立活動 (需花費 Gas 手續費)</button>
    </div>

    <div class="box">
        <h3>第三步：一般用戶購票</h3>
        <button id="buyBtn">購買一手票 (花費 1 ETH)</button>
    </div>

    <script>
        // ==========================================
        // ⚠️ 請在這裡貼上你剛剛複製的兩把鑰匙！
        // ==========================================
        
        // 1. 換成你的合約地址 (保留雙引號)
        const contractAddress = "0x0a779811C55F8a25B7F69674268373d4d9402F88"; 
        
        // 2. 換成你的 ABI (把裡面那串中文刪掉，貼上整個中括號陣列)
        const contractABI = [
    {
        "inputs": [
            { "internalType": "string", "name": "_name", "type": "string" },
            { "internalType": "uint256", "name": "_price", "type": "uint256" },
            { "internalType": "uint256", "name": "_totalTickets", "type": "uint256" }
        ],
        "name": "createActivity",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    },
    {
        "inputs": [
            { "internalType": "uint256", "name": "_activityId", "type": "uint256" }
        ],
        "name": "buyTicket",
        "outputs": [],
        "stateMutability": "payable",
        "type": "function"
    },
    {
        "inputs": [
            { "internalType": "uint256", "name": "", "type": "uint256" }
        ],
        "name": "activities",
        "outputs": [
            { "internalType": "string", "name": "name", "type": "string" },
            { "internalType": "uint256", "name": "originPrice", "type": "uint256" },
            { "internalType": "uint256", "name": "totalTickets", "type": "uint256" },
            { "internalType": "uint256", "name": "soldCount", "type": "uint256" },
            { "internalType": "address", "name": "organizer", "type": "address" }
        ],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [],
        "name": "activityCount",
        "outputs": [
            { "internalType": "uint256", "name": "", "type": "uint256" }
        ],
        "stateMutability": "view",
        "type": "function"
    }
];

        // ==========================================

        let web3;
        let ticketContract;
        let currentAccount;

        // 按鈕：連接錢包
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    currentAccount = accounts[0];
                    document.getElementById('accountAddress').innerText = currentAccount;
                    
                    web3 = new Web3(window.ethereum);
                    ticketContract = new web3.eth.Contract(contractABI, contractAddress);
                    alert("錢包連接成功！");
                } catch (error) {
                    console.error("連接錢包失敗", error);
                }
            } else {
                alert("請先安裝 MetaMask 擴充功能！");
            }
        });

        // 按鈕：建立活動
        document.getElementById('createBtn').addEventListener('click', async () => {
            if (!currentAccount) return alert("請先連接錢包！");
            try {
                const priceInWei = web3.utils.toWei("1", "ether"); 
                await ticketContract.methods.createActivity("五月天演唱會", priceInWei, 100).send({ from: currentAccount });
                alert("區塊鏈寫入成功：活動已建立！");
            } catch (error) {
                console.error(error);
                alert("建立失敗，請查看瀏覽器控制台。");
            }
        });

        // 按鈕：購買票券
        document.getElementById('buyBtn').addEventListener('click', async () => {
            if (!currentAccount) return alert("請先連接錢包！");
            try {
                const priceInWei = web3.utils.toWei("1", "ether");
                await ticketContract.methods.buyTicket(1).send({ 
                    from: currentAccount,
                    value: priceInWei 
                });
                alert("區塊鏈寫入成功：購票完成！");
            } catch (error) {
                console.error(error);
                alert("購票失敗，請確認活動是否建立或餘額是否足夠。");
            }
        });
    </script>
</body>
</html>
